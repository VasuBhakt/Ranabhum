services:
  # --- INFRASTRUCTURE ---
  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      - --advertise-kafka-addr INTERNAL://redpanda:29092,EXTERNAL://127.0.0.1:9092
    ports:
      - "9092:9092"
      - "9644:9644"

  redpanda-console:
    image: redpandadata/console:latest
    ports:
      - "8081:8080"
    environment:
      KAFKA_BROKERS: ${KAFKA_BROKERS:-redpanda:29092}
    depends_on:
      - redpanda

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data

  # --- MICROSERVICES ---
  sandbox-engine:
    build:
      context: ./sandbox-engine
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: ${KAFKA_BROKERS:-redpanda:29092}
      SANDBOX_HOST: ${SANDBOX_HOST:-http://host.docker.internal} # resolves to host machine where sandbox containers' ports are bound
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Mount host docker socket to deploy contestant sandboxes on host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redpanda

  botfleet-coordinator:
    build:
      context: ./botfleet
      dockerfile: Dockerfile
    command: ["/coordinator"]
    env_file:
      - ./.env
    environment:
      KAFKA_BROKERS: ${KAFKA_BROKERS:-redpanda:29092}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      SANDBOX_ENGINE_URL: ${SANDBOX_ENGINE_URL:-http://sandbox-engine:8080}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redpanda
      - redis

  telemetry-api:
    build:
      context: ./telemetry
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@timescaledb:5432/postgres}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      - timescaledb
      - redis

  telemetry-consumer:
    build:
      context: ./telemetry
      dockerfile: Dockerfile
    command: ["python", "-m", "app.consumer.kafka_consumer"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@timescaledb:5432/postgres}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-redpanda:29092}
      TELEMETRY_API_URL: ${TELEMETRY_API_URL:-http://telemetry-api:8001}
    depends_on:
      - timescaledb
      - redis
      - redpanda
      - telemetry-api

  telemetry-frontend:
    build:
      context: ./telemetry/frontend
      dockerfile: Dockerfile
    ports:
      - "8082:80"
    depends_on:
      - telemetry-api

volumes:
  timescaledb_data:
  redis_data:
