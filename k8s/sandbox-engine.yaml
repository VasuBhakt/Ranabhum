apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-engine
  labels:
    app: sandbox-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sandbox-engine
  template:
    metadata:
      labels:
        app: sandbox-engine
    spec:
      containers:
      - name: sandbox-engine
        image: sandbox-engine:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: KAFKA_BROKERS
          value: redpanda:29092
        - name: DOCKER_HOST
          value: tcp://127.0.0.1:2375
        - name: SANDBOX_HOST
          value: http://sandbox-engine
      - name: dind
        image: docker:dind
        securityContext:
          privileged: true
        env:
        - name: DOCKER_TLS_CERTDIR
          value: ""
        ports:
        - containerPort: 2375
---
apiVersion: v1
kind: Service
metadata:
  name: sandbox-engine
spec:
  clusterIP: None
  ports:
  - port: 8080
    name: api
  selector:
    app: sandbox-engine
