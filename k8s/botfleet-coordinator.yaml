apiVersion: apps/v1
kind: Deployment
metadata:
  name: botfleet-coordinator
  labels:
    app: botfleet-coordinator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: botfleet-coordinator
  template:
    metadata:
      labels:
        app: botfleet-coordinator
    spec:
      containers:
      - name: coordinator
        image: botfleet:latest
        imagePullPolicy: IfNotPresent
        command: ["/coordinator"]
        env:
        - name: KAFKA_BROKERS
          value: redpanda:29092
        - name: REDIS_ADDR
          value: redis:6379
        - name: BOT_COUNT
          value: "3"
        - name: RATE_PER_BOT
          value: "10"
        - name: RUN_DURATION
          value: 30s
        - name: SANDBOX_ENGINE_URL
          value: http://sandbox-engine:8080
