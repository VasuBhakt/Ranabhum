apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda
  labels:
    app: redpanda
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redpanda
  template:
    metadata:
      labels:
        app: redpanda
    spec:
      containers:
      - name: redpanda
        image: redpandadata/redpanda:latest
        command:
        - redpanda
        - start
        - --smp=1
        - --memory=512M
        - --overprovisioned
        - --kafka-addr=INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
        - --advertise-kafka-addr=INTERNAL://redpanda:29092,EXTERNAL://localhost:9092
        ports:
        - containerPort: 29092
          name: kafka-internal
        - containerPort: 9092
          name: kafka-external
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda
spec:
  ports:
  - port: 29092
    name: kafka-internal
  - port: 9092
    name: kafka-external
  selector:
    app: redpanda
